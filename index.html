<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickCal Pro v2.1.0 - Geostics OS</title>
    <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #141419;
            --bg-card: #1c1c24;
            --accent-blue: #0076ff;
            --accent-pulse: #00ebff;
            --accent-green: #34c759;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --border-color: #2c2c35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 메인 레이아웃 크기 조정 및 전술 헤더 */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .gps-status-container {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-pulse);
            background: rgba(0, 235, 255, 0.08);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 235, 255, 0.2);
        }

        /* 대시보드 뷰 스위처 */
        .view-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            overflow-y: auto;
        }

        .view-panel.active {
            display: block;
        }

        /* 레이더/지도 영역 시뮬레이션 */
        #radar-view {
            background: #0d0e12;
            position: relative;
        }

        .mock-map {
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#1f2330 1px, transparent 1px);
            background-size: 24px 24px;
            position: relative;
        }

        /* GPS 블루 닷 (펄스 마커) 최상단 복구 */
        .gps-pulse-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background-color: var(--accent-blue);
            border-radius: 50%;
            border: 2px solid #ffffff;
            z-index: 9999 !important;
            box-shadow: 0 0 10px rgba(0, 118, 255, 0.6);
        }

        .gps-pulse-marker::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            width: 34px;
            height: 34px;
            border: 2px solid var(--accent-pulse);
            border-radius: 50%;
            animation: gpsPulse 1.8s infinite ease-out;
            opacity: 0;
        }

        @keyframes gpsPulse {
            0% { transform: scale(0.4); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        /* LST 탭 UI 및 주소 압축 요약 */
        .order-list {
            padding: 12px;
        }

        .order-card-row {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .order-card-row:active {
            background-color: #24242e;
        }

        .address-summary-badge {
            background: #2c2c3a;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 6px;
            text-align: center;
            min-width: 60px;
        }

        .order-brief-info {
            flex: 1;
            margin-left: 14px;
        }

        .order-brief-route {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        .order-brief-earnings {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-green);
        }

        /* 체인 포인트(번들) 하단 팝업 조작계 */
        .chain-trigger-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 6px 16px rgba(0,0,0,0.4);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chain-panel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 500;
            padding: 20px;
        }

        .chain-panel-overlay.active {
            transform: translateY(0);
        }

        .chain-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chain-title {
            font-size: 16px;
            font-weight: 800;
        }

        .chain-list-container {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .chain-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chain-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            accent-color: var(--accent-blue);
        }

        .chain-footer-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .net-amount {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-green);
        }

        .multi-navi-btn {
            width: 100%;
            background-color: #fee500;
            color: #191919;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
        }

        /* ORDER DETAILS Fullscreen View 리팩토링 및 60fps 스와이프 인터랙션 */
        #order-details-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-primary);
            z-index: 10000;
            transform: translateY(100%);
            will-change: transform;
            display: flex;
            flex-direction: column;
        }

        #order-details-modal.active {
            transform: translateY(0);
        }

        .modal-drag-handle-zone {
            width: 100%;
            padding: 14px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-secondary);
            cursor: pointer;
        }

        .drag-handle-bar {
            width: 40px;
            height: 5px;
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .modal-main-header {
            background-color: var(--bg-secondary);
            padding: 0 20px 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-main-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .modal-scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* 내부 명칭 단축화 및 15% 서체 확대 최적화 고도화 */
        .detail-data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .detail-card-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
        }

        .detail-label {
            font-size: 13.8px;
            font-weight: 800;
            color: var(--text-sub);
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 18.4px; /* 기존 대 대비 15% 확대 */
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.4;
        }

        .detail-value.highlight-green {
            color: var(--accent-green);
            font-size: 23px; /* 가독성 대폭 강조 */
            font-weight: 900;
        }

        /* 네비게이션 바 및 세팅 UI */
        .settings-form {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
        }

        .save-btn {
            width: 100%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
        }

        nav {
            height: 64px;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            z-index: 10;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-sub);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-tab.active {
            color: var(--text-main);
            background-color: rgba(255,255,255,0.02);
        }

        .nav-tab-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-title">GEOSTICS OS v2.1</div>
        <div class="gps-status-container" id="current-gps-string">위치 탐색 중...</div>
    </header>

    <div class="view-content">
        <div id="ord-panel" class="view-panel active">
            <div id="radar-view" class="mock-map">
                <div class="gps-pulse-marker"></div>
                <button class="chain-trigger-btn" onclick="toggleChainPanel(true)">
                    <span>⛓️</span> CHAIN CALC
                </button>
            </div>
        </div>

        <div id="lst-panel" class="view-panel">
            <div class="order-list" id="order-list-render-target">
                </div>
        </div>

        <div id="settings-panel" class="view-panel">
            <div class="settings-form">
                <div class="form-group">
                    <label>TMAP API KEY</label>
                    <input type="text" id="input-tmap-key" value="tmap_prod_secure_99a">
                </div>
                <div class="form-group">
                    <label>KAKAO API KEY (JAVASCRIPT KEY)</label>
                    <input type="text" id="input-kakao-key" placeholder="키를 입력하십시오.">
                </div>
                <button class="save-btn" onclick="saveSystemKeys()">SAVE CONFIGURATION</button>
            </div>
        </div>

        <div class="chain-panel-overlay" id="chain-control-overlay">
            <div class="chain-header">
                <div class="chain-title">CHAIN CONFIGURATOR</div>
                <button style="background:none; border:none; color:var(--text-sub); font-size:20px;" onclick="toggleChainPanel(false)">✕</button>
            </div>
            <div class="chain-list-container" id="chain-checkbox-target">
                </div>
            <div class="chain-footer-summary">
                <div style="font-size:14px; color:var(--text-sub); font-weight:700;">TOTAL NET ESTIMATE</div>
                <div class="net-amount" id="chain-net-display">0 ₩</div>
            </div>
            <button class="multi-navi-btn" onclick="executeKakaoMultiNavi()">🚖 MULTI NAVI</button>
        </div>
    </div>

    <div id="order-details-modal">
        <div class="modal-drag-handle-zone" id="modal-drag-zone">
            <div class="drag-handle-bar"></div>
        </div>
        <div class="modal-main-header">
            <div class="modal-main-title">ORDER DETAILS</div>
        </div>
        <div class="modal-scroll-content">
            <div class="detail-data-grid">
                <div class="detail-card-item">
                    <div class="detail-label">SHIFT</div>
                    <div class="detail-value" id="md-shift">-</div>
                </div>
                <div class="detail-card-item">
                    <div class="detail-label">ROUTE</div>
                    <div class="detail-value" id="md-route">-</div>
                </div>
                <div class="detail-card-item">
                    <div class="detail-label">EARNINGS</div>
                    <div class="detail-value highlight-green" id="md-earnings">-</div>
                </div>
                <div class="detail-card-item">
                    <div class="detail-label">NAVI</div>
                    <div class="detail-value" id="md-navi" style="color:var(--accent-blue); font-size:16px;">READY</div>
                </div>
                <div class="detail-card-item">
                    <div class="detail-label">EFFICIENCY</div>
                    <div class="detail-value" id="md-efficiency">-</div>
                </div>
                <div class="detail-card-item">
                    <div class="detail-label">MEMO</div>
                    <div class="detail-value" id="md-memo" style="font-size:16px; font-weight:500;">-</div>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-tab active" onclick="switchView('ord')">
            <span class="nav-tab-icon">🎯</span>ORD
        </div>
        <div class="nav-tab" onclick="switchView('lst')">
            <span class="nav-tab-icon">📋</span>LST
        </div>
        <div class="nav-tab" onclick="switchView('settings')">
            <span class="nav-tab-icon">⚙️</span>SETTINGS
        </div>
    </nav>
</div>

<script>
    // 1. 마스터 목데이터 인프라셋
    const mockOrders = [
        { id: 101, summaryAddress: "화도", fullAddress: "경기도 남양주시 화도읍 경춘로 (화도읍)", shift: "09:00 - 13:00", earnings: 4500, efficiency: "94.2%", memo: "경비실 앞에 놓아주세요.", lat: 37.6525, lng: 127.3081 },
        { id: 102, summaryAddress: "호평", fullAddress: "경기도 남양주시 호평동 늘을3로 (호평동)", shift: "11:00 - 15:00", earnings: 5200, efficiency: "89.7%", memo: "벨 누르지 말고 문자 주세요.", lat: 37.6432, lng: 127.2415 },
        { id: 103, summaryAddress: "평내", fullAddress: "경기도 남양주시 평내동 평내로 (평내동)", shift: "12:30 - 16:30", earnings: 3800, efficiency: "91.0%", memo: "공동현관 비번 #1234", lat: 37.6341, lng: 127.2321 },
        { id: 104, summaryAddress: "역삼", fullAddress: "서울특별시 강남구 역삼동 테헤란로 (역삼동)", shift: "18:00 - 22:00", earnings: 7000, efficiency: "96.5%", memo: "회사 로비 데스크에 보관", lat: 37.5002, lng: 127.0365 }
    ];

    let selectedChainOrderIds = [];

    // 2. 초기 기동 프로세스
    document.addEventListener("DOMContentLoaded", () => {
        // 로컬스토리지 키 마이그레이션 및 적용
        if(!localStorage.getItem('qcp_key_kakao')) {
            localStorage.setItem('qcp_key_kakao', 'eb1e2b8c1d3789ea90421ddc70c786d0'); // 마스터 기본값 자동 탑재
        }
        document.getElementById('input-kakao-key').value = localStorage.getItem('qcp_key_kakao');
        
        initKakaoSDK();
        renderGpsString();
        renderOrderList();
        renderChainCheckboxes();
        initSwipeToCloseGesture();
    });

    // 3. 카카오 SDK 로드 및 동적 인스턴스화
    function initKakaoSDK() {
        const key = localStorage.getItem('qcp_key_kakao');
        if (key && key.trim() !== "") {
            try {
                if (window.Kakao) {
                    if (!Kakao.isInitialized()) {
                        Kakao.init(key);
                    }
                }
            } catch (e) {
                console.error("카카오 인증 오류: ", e);
            }
        }
    }

    function saveSystemKeys() {
        localStorage.setItem('qcp_key_tmap', document.getElementById('input-tmap-key').value);
        localStorage.setItem('qcp_key_kakao', document.getElementById('input-kakao-key').value);
        initKakaoSDK();
        alert("시스템 API 인증 Key 세팅이 스토리지에 영구 보존되었습니다.");
    }

    // 4. GPS 역지오코딩 포맷 적용 로직
    function renderGpsString() {
        // 아키텍트 지시 사항 반영 포맷: 시구군 동이름 (도로명)
        const targetString = "남양주시 화도읍 (경춘로)";
        document.getElementById('current-gps-string').innerText = `📍 ${targetString}`;
    }

    // 5. 대시보드 뷰 체인저
    function switchView(viewName) {
        document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

        document.getElementById(`${viewName}-panel`).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(viewName !== 'ord') toggleChainPanel(false);
    }

    // 6. LST 요약주소 기반 렌더러
    function renderOrderList() {
        const target = document.getElementById('order-list-render-target');
        target.innerHTML = "";
        
        mockOrders.forEach(order => {
            const row = document.createElement('div');
            row.className = 'order-card-row';
            row.onclick = () => openOrderDetails(order);
            
            row.innerHTML = `
                <div class="address-summary-badge">${order.summaryAddress}</div>
                <div class="order-brief-info">
                    <div class="order-brief-earnings">${order.earnings.toLocaleString()} ₩</div>
                    <div class="order-brief-route">${order.fullAddress}</div>
                </div>
                <div style="color:var(--text-sub); font-weight:bold;">〉</div>
            `;
            target.appendChild(row);
        });
    }

    // 7. 체인 포인트(번들) 오퍼레이션
    function toggleChainPanel(show) {
        const overlay = document.getElementById('chain-control-overlay');
        if(show) overlay.classList.add('active');
        else overlay.classList.remove('active');
    }

    function renderChainCheckboxes() {
        const target = document.getElementById('chain-checkbox-target');
        target.innerHTML = "";
        
        mockOrders.forEach(order => {
            const item = document.createElement('label');
            item.className = 'chain-item';
            item.innerHTML = `
                <input type="checkbox" value="${order.id}" onchange="updateChainCalculation()">
                <div>
                    <span style="font-weight:800; color:#fff;">[${order.summaryAddress}]</span> 
                    <span style="color:var(--accent-green); font-weight:700; margin-left:6px;">${order.earnings}₩</span>
                </div>
            `;
            target.appendChild(item);
        });
    }

    function updateChainCalculation() {
        const checkedBoxes = document.querySelectorAll('#chain-checkbox-target input[type="checkbox"]:checked');
        selectedChainOrderIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
        
        let netSum = 0;
        selectedChainOrderIds.forEach(id => {
            const ord = mockOrders.find(o => o.id === id);
            if(ord) netSum += ord.earnings;
        });
        
        document.getElementById('chain-net-display').innerText = `${netSum.toLocaleString()} ₩`;
    }

    // 8. 카카오 멀티내비(다중 경유지 동적 할당 및 명칭 법정동 파싱 엔진)
    function executeKakaoMultiNavi() {
        if(selectedChainOrderIds.length === 0) {
            alert("연동할 오더를 CHAIN 목록에서 선택하십시오.");
            return;
        }

        const selectedOrders = selectedChainOrderIds.map(id => mockOrders.find(o => o.id === id)).filter(Boolean);
        
        // 데이터 정렬 규칙: 최종 선택 오더의 마지막 하차지를 목적지로, 이전 오더는 경유지로 가변 전환
        const lastIndex = selectedOrders.length - 1;
        const destinationOrder = selectedOrders[lastIndex];
        const waypointOrders = selectedOrders.slice(0, lastIndex);

        if(waypointOrders.length > 3) {
            alert("카카오내비 시스템 한계로 경유지는 최대 3개까지만 지원됩니다.");
            return;
        }

        // 경유지 구조체 바인딩 (D1, D2 폐기 -> 실제 법정동 명칭 바인딩 적용)
        const viaList = waypointOrders.map(ord => ({
            name: ord.summaryAddress + "동", // 법정동 명칭 사용 철칙 준수
            x: ord.lng,
            y: ord.lat
        }));

        console.log("== 카카오 멀티내비 기동 시퀀스 ==");
        console.log("목적지:", destinationOrder.summaryAddress);
        console.log("경유지 배열:", viaList);

        // 카카오 공식 SDK 호출 또는 하이브리드 인텐트 크래시 방지 스킴 연동
        if (window.Kakao && Kakao.isInitialized()) {
            Kakao.Navi.start({
                name: destinationOrder.summaryAddress + "동",
                x: destinationOrder.lng,
                y: destinationOrder.lat,
                coordType: 'wgs84',
                viaPoints: viaList
            });
        } else {
            // 카카오 앱 직접 호출 스킴 폴백 (웹뷰 환경 대응)
            let schemeUrl = `kakaonavi://route?destx=${destinationOrder.lng}&desty=${destinationOrder.lat}&destname=${encodeURIComponent(destinationOrder.summaryAddress + "동")}`;
            
            // 경유지 쿼리 파라미터 동적 빌드
            if(viaList.length > 0) {
                let vias = viaList.map(v => `${encodeURIComponent(v.name)},${v.x},${v.y}`).join("|");
                schemeUrl += `&vias=${vias}`;
            }
            window.location.href = schemeUrl;
        }
    }

    // 9. ORDER DETAILS 오픈 및 필드 바인딩
    function openOrderDetails(order) {
        document.getElementById('md-shift').innerText = order.shift;
        document.getElementById('md-route').innerText = order.fullAddress; // 요약에서 [도로명 (법정동)] 상세 매핑 연동
        document.getElementById('md-earnings').innerText = `${order.earnings.toLocaleString()} ₩`;
        document.getElementById('md-efficiency').innerText = order.efficiency;
        document.getElementById('md-memo').innerText = order.memo ? order.memo : "NO MEMO";

        const modal = document.getElementById('order-details-modal');
        modal.style.transform = "translateY(0%)";
        modal.classList.add('active');
    }

    // 10. 60fps 초고속 가속도 스와이프 오프(Swipe down to close) 고성능 제스처 엔진
    function initSwipeToCloseGesture() {
        const modal = document.getElementById('order-details-modal');
        const dragZone = document.getElementById('modal-drag-zone');
        
        let startY = 0;
        let currentY = 0;
        let isTracking = false;
        let startTime = 0;

        // 드래그 존 터치 영역 및 본문 상단 스와이프 연동 고도화
        const bindTargets = [dragZone, modal];

        bindTargets.forEach(target => {
            target.addEventListener('touchstart', (e) => {
                // 스크롤 내부 영역에서 드래그 다운 오작동 분기 제어
                if(e.currentTarget === modal && modal.querySelector('.modal-scroll-content').scrollTop > 0) {
                    return;
                }
                
                startY = e.touches[0].clientY;
                startTime = performance.now();
                isTracking = true;
                modal.style.transition = 'none'; // 실시간 반응을 위한 트랜지션 해제
            }, { passive: true });

            target.addEventListener('touchmove', (e) => {
                if (!isTracking) return;
                currentY = e.touches[0].clientY;
                let deltaY = currentY - startY;

                if (deltaY > 0) {
                    // 하방 드래그 가속도 60fps 변환 매핑
                    modal.style.transform = `translateY(${deltaY}px)`;
                }
            }, { passive: true });

            target.addEventListener('touchend', (e) => {
                if (!isTracking) return;
                isTracking = false;

                let deltaY = currentY - startY;
                let duration = performance.now() - startTime;
                let velocity = deltaY / duration; // 속도 기반 튕기기 제어 계산

                modal.style.transition = 'transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1)';

                // 절반 이상 내렸거나 혹은 가속도가 임계치(0.5) 이상 빠른 플릭 모션일 때 종료 처리
                if (deltaY > window.innerHeight * 0.35 || velocity > 0.5) {
                    modal.style.transform = 'translateY(100%)';
                    modal.classList.remove('active');
                } else {
                    // 원위치 탄성 스냅 복구
                    modal.style.transform = 'translateY(0px)';
                }
                
                // 클린업
                startY = 0;
                currentY = 0;
            });
        });
        
        // 드래그바 터치 클릭 시 즉각 강제 클로즈 이중 안전 장치
        dragZone.addEventListener('click', () => {
            modal.style.transition = 'transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1)';
            modal.style.transform = 'translateY(100%)';
            modal.classList.remove('active');
        });
    }
</script>
